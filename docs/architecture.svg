<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <style>
      .bx   { fill:#f1f5f9; stroke:#334155; stroke-width:2; rx:10; }
      .g    { fill:#ecfdf5; stroke:#059669; stroke-width:2.5; rx:10; }
      .d    { fill:#fef2f2; stroke:#dc2626; stroke-width:2.5; rx:10; }
      .io   { fill:#eff6ff; stroke:#2563eb; stroke-width:2; rx:10; }
      .out  { fill:#f8fafc; stroke:#475569; stroke-width:1.5; rx:8; }
      .aud  { fill:#fffbeb; stroke:#d97706; stroke-width:2; rx:10; }
      .t    { fill:#0f172a; font-size:15px; font-weight:700; text-anchor:middle; }
      .s    { fill:#475569; font-size:11.5px; text-anchor:middle; }
      .xs   { fill:#64748b; font-size:9.5px; text-anchor:middle; }
      .lbl  { fill:#64748b; font-size:11px; font-style:italic; text-anchor:middle; }
      .lblr { fill:#dc2626; font-size:10px; font-style:italic; text-anchor:middle; }
      .ret  { fill:none; stroke:#475569; stroke-width:2; }
      .dash { fill:none; stroke:#94a3b8; stroke-width:1.6; stroke-dasharray:5 4; }
      .ln   { stroke:#475569; stroke-width:2; }
      .lnR  { stroke:#dc2626; stroke-width:2; }
      .h1   { fill:#0f172a; font-size:26px; font-weight:800; text-anchor:middle; }
      .h2   { fill:#475569; font-size:13px; text-anchor:middle; }
      .ft   { fill:#334155; font-size:12px; font-style:italic; text-anchor:middle; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1600" fill="#ffffff"/>

  <!-- Title -->
  <text class="h1" x="800" y="48">sift-sentinel — guarded autonomous DFIR triage agent</text>
  <text class="h2" x="800" y="76">Deterministic plan-act-validate loop over the SANS Find Evil playbook · guardrails enforced in code · replayable audit trail</text>

  <!-- Inputs -->
  <rect class="io" x="102" y="118" width="540" height="82" rx="10"/>
  <text class="t" x="372" y="150">SANS Find Evil playbook · 7 ordered phases</text>
  <text class="xs" x="372" y="174">Acquisition · Memory/Process · Persistence · Timeline · Network · Lateral · Synthesis</text>

  <rect class="io" x="845" y="118" width="480" height="82" rx="10"/>
  <text class="t" x="1085" y="146">Evidence sources</text>
  <text class="s" x="1085" y="166">disk.raw · memory.mem · pcap</text>
  <text class="xs" x="1085" y="184">SHA-256 baseline captured at case open</text>

  <!-- input arrows -->
  <line class="ln" x1="305" y1="200" x2="258" y2="298" marker-end="url(#arr)"/>
  <text class="lbl" x="318" y="252">phase + tools</text>
  <line class="ln" x1="965" y1="200" x2="822" y2="298" marker-end="url(#arr)"/>
  <text class="lbl" x="930" y="252">read-only</text>

  <!-- Loop row -->
  <rect class="bx" x="115" y="300" width="230" height="110" rx="10"/>
  <text class="t" x="230" y="340">Planner</text>
  <text class="s" x="230" y="362">scripted | Claude</text>
  <text class="s" x="230" y="380">proposes one tool call</text>

  <rect class="g" x="400" y="300" width="230" height="110" rx="10"/>
  <text class="t" x="515" y="338">Guardrail · check_call</text>
  <text class="s" x="515" y="360">allowlist · explicit-deny</text>
  <text class="s" x="515" y="378">path jail (evidence/workspace)</text>

  <rect class="bx" x="685" y="300" width="230" height="110" rx="10"/>
  <text class="t" x="800" y="340">Backend · call_tool</text>
  <text class="s" x="800" y="362">MCP Protocol SIFT</text>
  <text class="s" x="800" y="380">| simulated (offline)</text>

  <rect class="g" x="970" y="300" width="230" height="110" rx="10"/>
  <text class="t" x="1085" y="338">Guardrail · verify_evidence</text>
  <text class="s" x="1085" y="360">SHA-256 integrity ledger</text>
  <text class="s" x="1085" y="378">re-check vs baseline</text>

  <rect class="bx" x="1255" y="300" width="230" height="110" rx="10"/>
  <text class="t" x="1370" y="338">Interpret · Integrate</text>
  <text class="s" x="1370" y="360">findings → hypothesis</text>
  <text class="s" x="1370" y="378">&gt;0.70 ⇒ confirmed</text>

  <!-- between-box arrows -->
  <line class="ln" x1="345" y1="355" x2="400" y2="355" marker-end="url(#arr)"/>
  <text class="lbl" x="372" y="346">plan</text>
  <line class="ln" x1="630" y1="355" x2="685" y2="355" marker-end="url(#arr)"/>
  <text class="lbl" x="657" y="346">allow</text>
  <line class="ln" x1="915" y1="355" x2="970" y2="355" marker-end="url(#arr)"/>
  <text class="lbl" x="942" y="346">result</text>
  <line class="ln" x1="1200" y1="355" x2="1255" y2="355" marker-end="url(#arr)"/>
  <text class="lbl" x="1227" y="346">validated</text>

  <!-- deny off-ramp -->
  <line class="lnR" x1="515" y1="410" x2="500" y2="468" marker-end="url(#arrR)"/>
  <text class="lblr" x="560" y="446">deny</text>
  <rect class="d" x="365" y="470" width="270" height="82" rx="10"/>
  <text class="t" x="500" y="498" fill="#b91c1c">DENIED → planner</text>
  <text class="xs" x="500" y="518" fill="#b91c1c">DenyCode (closed union):</text>
  <text class="xs" x="500" y="534" fill="#b91c1c">not-allowlisted · explicitly-denied</text>
  <text class="xs" x="500" y="547" fill="#b91c1c">path-outside-jail · hash-mismatch</text>

  <!-- Backend <-> SIFT -->
  <line class="ln" x1="800" y1="410" x2="800" y2="468" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text class="lbl" x="853" y="446">MCP / stdio</text>
  <rect class="bx" x="675" y="470" width="290" height="82" rx="10"/>
  <text class="t" x="820" y="498">SANS SIFT Workstation</text>
  <text class="s" x="820" y="518">200+ read-only forensic tools</text>
  <text class="xs" x="820" y="536">volatility3 · log2timeline · tshark · regripper …</text>

  <!-- result down to interpret already shown via row; show verify feeds interpret implied by arrow validated -->

  <!-- return loop arrow -->
  <path class="ret" d="M1370,410 L1370,444 L230,444 L230,410" marker-end="url(#arr)"/>
  <text class="lbl" x="800" y="436">next phase · revise hypothesis — loop until 7 phases done or max-iterations</text>

  <!-- audit feed -->
  <path class="dash" d="M1085,410 L1085,588" marker-end="url(#arr)"/>
  <text class="lbl" x="1140" y="500">audit.record()</text>
  <text class="lbl" x="1140" y="515">every step</text>

  <!-- Audit band -->
  <rect class="aud" x="180" y="590" width="1240" height="60" rx="10"/>
  <text class="t" x="800" y="616" fill="#92400e">Audit trail — one flushed JSONL record per step</text>
  <text class="s" x="800" y="636" fill="#92400e">plan · tool_call · validation · revision · report · stop&#160;&#160;→&#160;&#160;analysis/forensic_audit.jsonl</text>

  <!-- audit -> deliverables -->
  <line class="ln" x1="700" y1="650" x2="640" y2="688" marker-end="url(#arr)"/>

  <!-- Deliverables -->
  <rect class="out" x="135" y="690" width="300" height="78" rx="8"/>
  <text class="t" x="285" y="722">forensic_audit.jsonl</text>
  <text class="s" x="285" y="742">full step-by-step trail</text>

  <rect class="out" x="480" y="690" width="300" height="78" rx="8"/>
  <text class="t" x="630" y="722">IR report (.md)</text>
  <text class="s" x="630" y="742">verdict · IOCs · MITRE ATT&amp;CK</text>

  <rect class="out" x="825" y="690" width="300" height="78" rx="8"/>
  <text class="t" x="975" y="722">state.json</text>
  <text class="s" x="975" y="742">raw case state</text>

  <rect class="out" x="1170" y="690" width="300" height="78" rx="8"/>
  <text class="t" x="1320" y="722">accuracy report</text>
  <text class="s" x="1320" y="742">precision · recall · F1</text>

  <!-- Footer -->
  <text class="ft" x="800" y="800">Guardrails are code, not prompts — the model cannot override the allowlist, path jail, or integrity ledger.  The simulated backend runs the full loop offline (no API key, no VM).</text>
</svg>
